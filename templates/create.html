<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Title }} — Notes App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <div class="container">
        <header class="header">
            <a href="/" class="logo">MyNotes</a>
        </header>

        <main>
            <div class="form-wrapper">
                <h2>Create a New Note</h2>

                {{ if .Error }}
                <div class="alert alert-error" id="form-error">{{ .Error }}</div>
                {{ end }}

                <form action="/notes" method="POST" class="note-form" id="create-note-form">
                    <div class="form-group">
                        <label for="title">Title</label>
                        <input type="text" id="title" name="title" placeholder="Give your note a title…"
                            value="{{ .NoteTitle }}" maxlength="200" required>
                    </div>

                    <div class="form-group">
                        <label for="content">Content <span class="label-hint">(Markdown supported)</span></label>
                        <textarea id="content" name="content" rows="14" placeholder="Write your note in Markdown…"
                            required>{{ .NoteContent }}</textarea>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary" id="btn-submit">Save Note</button>
                        <a href="/" class="btn btn-outline">Cancel</a>
                    </div>
                </form>
            </div>
        </main>
    </div>
</body>

</html>
